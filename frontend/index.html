<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineBase — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="filmstrip"></div>

  <div class="wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 4v1M12 4v1M17 4v1M4 9h16M4 14h16M7 14v1M12 14v1M17 14v1M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"
            stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <rect x="7" y="9" width="2" height="5" rx="0.5" fill="white"/>
          <rect x="15" y="9" width="2" height="5" rx="0.5" fill="white"/>
        </svg>
      </div>
      <h1>Pobre Play</h1>
      <p>Sistema de organização de filmes</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Tabs -->
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true"
          onclick="switchTab('login')">Entrar</button>
        <button class="tab-btn" id="tab-signup" role="tab" aria-selected="false"
          onclick="switchTab('signup')">Criar conta</button>
      </div>

      <!-- ========== LOGIN ========== -->
      <div class="view active" id="view-login">
        <p class="section-title">Bem-vindo de volta</p>
        <p class="section-sub">Acesse sua conta para continuar</p>

        <form class="form" id="form-login" novalidate onsubmit="handleLogin(event)">

          <!-- Email -->
          <div class="field">
            <label for="login-email">E-mail</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,5 12,13 21,5"/></svg>
              </span>
              <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
            </div>
            <span class="err-msg" id="err-login-email">Informe um e-mail válido.</span>
          </div>

          <!-- Senha -->
          <div class="field">
            <label for="login-senha">Senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              </span>
              <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password" />
              <button type="button" class="toggle-pw" onclick="togglePw('login-senha', this)" aria-label="Mostrar senha">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="err-msg" id="err-login-senha">Informe sua senha.</span>
          </div>

          <button type="submit" class="btn-primary">
            <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Entrar
          </button>

        </form>
      </div>

      <!-- ========== SIGNUP ========== -->
      <div class="view" id="view-signup">
        <p class="section-title">Criar nova conta</p>
        <p class="section-sub">Preencha os dados para se cadastrar</p>

        <form class="form" id="form-signup" novalidate onsubmit="handleSignup(event)">

          <!-- Nome -->
          <div class="field">
            <label for="signup-nome">Nome completo</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" id="signup-nome" placeholder="João Silva" autocomplete="name" />
            </div>
            <span class="err-msg" id="err-signup-nome">Informe seu nome completo.</span>
          </div>

          <!-- Email -->
          <div class="field">
            <label for="signup-email">E-mail</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,5 12,13 21,5"/></svg>
              </span>
              <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email" />
            </div>
            <span class="err-msg" id="err-signup-email">Informe um e-mail válido.</span>
          </div>

          <!-- Senha -->
          <div class="field">
            <label for="signup-senha">Senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              </span>
              <input type="password" id="signup-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
              <button type="button" class="toggle-pw" onclick="togglePw('signup-senha', this)" aria-label="Mostrar senha">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="err-msg" id="err-signup-senha">A senha deve ter pelo menos 6 caracteres.</span>
          </div>

          <!-- Tipo de acesso -->
          <div class="field">
            <label>Tipo de acesso</label>
            <div class="roles">
              <div class="role-opt">
                <input type="radio" name="tipo" id="tipo-comum" value="COMUM" checked />
                <label class="role-label" for="tipo-comum">
                  <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  <span>Comum</span>
                </label>
              </div>
              <div class="role-opt">
                <input type="radio" name="tipo" id="tipo-admin" value="ADMINISTRADOR" />
                <label class="role-label" for="tipo-admin">
                  <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  <span>Administrador</span>
                </label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-primary">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Criar conta
          </button>

        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite">
    <svg id="toast-icon" viewBox="0 0 24 24"></svg>
    <span id="toast-msg"></span>
  </div>

<!-- depois -->
  <script type="module" src="script.js"></script>
</body>
</html>
